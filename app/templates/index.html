<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Ops Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0d0f0f;
      --surface:    #141717;
      --border:     #1f2424;
      --border-lit: #2e3535;
      --text:       #d4dada;
      --muted:      #5a6868;
      --accent:     #00c896;
      --accent-dim: #00c89622;
      --user-bg:    #111515;
      --agent-bg:   #0f1414;
      --danger:     #e05555;
      --warn:       #e0a855;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--accent);
      display: grid;
      place-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .header-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.03em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    .user-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .user-selector label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }

    .user-selector select {
      background: var(--bg);
      border: 1px solid var(--border-lit);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .user-selector select:focus { border-color: var(--accent); }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .quick-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      padding: 8px 10px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      line-height: 1.4;
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .quick-btn .btn-tag {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .state-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .state-item {
      margin-bottom: 10px;
    }

    .state-key {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .state-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      word-break: break-all;
    }
    .state-val.null-val { color: var(--muted); font-style: italic; }
    .state-val.bool-true { color: var(--warn); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-lit); }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .msg-bubble {
      padding: 12px 16px;
      border: 1px solid var(--border);
      line-height: 1.6;
      max-width: 680px;
      white-space: pre-wrap;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border-color: var(--border-lit);
      align-self: flex-end;
      border-right: 2px solid var(--accent);
    }
    .msg.user .msg-meta { align-self: flex-end; }

    .msg.agent .msg-bubble {
      background: var(--agent-bg);
      border-color: var(--border);
      border-left: 2px solid var(--accent);
    }

    .msg.error .msg-bubble {
      border-left: 2px solid var(--danger);
      color: var(--danger);
    }

    /* Intent badge */
    .intent-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 7px;
      border: 1px solid var(--border-lit);
      color: var(--muted);
      margin-top: 4px;
      align-self: flex-start;
    }
    .intent-badge.guardrail { border-color: var(--danger); color: var(--danger); }
    .intent-badge.success   { border-color: var(--accent); color: var(--accent); }
    .intent-badge.pending   { border-color: var(--warn);   color: var(--warn);   }

    /* ── Typing indicator ── */
    .typing {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      background: var(--agent-bg);
      width: fit-content;
    }
    .typing.visible { display: flex; }
    .typing span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
      40%            { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      border: 1px solid var(--border-lit);
      background: var(--bg);
      display: flex;
      align-items: center;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 12px 20px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
      align-self: stretch;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .clear-btn {
      background: none;
      border: 1px solid var(--border-lit);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }
    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0.35;
      pointer-events: none;
    }
    .empty-state .big-mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    /* scrollbar for state panel */
    .state-panel::-webkit-scrollbar { width: 3px; }
    .state-panel::-webkit-scrollbar-thumb { background: var(--border-lit); }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo-mark">OA</div>
    <div>
      <div class="header-title">Order Operations Agent</div>
      <div class="header-sub">v1.0 · Test Console</div>
    </div>
  </div>
  <div class="header-right">
    <div class="user-selector">
      <label>User</label>
      <select id="user-select">
        <option value="user_1">user_1</option>
        <option value="user_2">user_2</option>
        <option value="user_3">user_3</option>
        <option value="user_4">user_4</option>
        <option value="user_5">user_5</option>
      </select>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">connecting</span>
    </div>
  </div>
</header>

<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Quick Actions</div>
      <button class="quick-btn" onclick="quickSend('Check order ORD-1001')">
        <span class="btn-tag">Lookup</span>
        Check order ORD-1001
      </button>
      <button class="quick-btn" onclick="quickSend('Cancel my order ORD-1001')">
        <span class="btn-tag">Cancel</span>
        Cancel order ORD-1001
      </button>
      <button class="quick-btn" onclick="quickSend('I want a refund')">
        <span class="btn-tag">Refund</span>
        Start refund flow
      </button>
      <button class="quick-btn" onclick="quickSend('Cancel my order ORD-1002')">
        <span class="btn-tag">Guardrail</span>
        Cancel shipped order
      </button>
    </div>

    <div class="sidebar-section" style="border-bottom: none;">
      <div class="sidebar-label">Workflow State</div>
    </div>
    <div class="state-panel" id="state-panel">
      <div class="state-item">
        <div class="state-key">pending_intent</div>
        <div class="state-val null-val" id="s-intent">null</div>
      </div>
      <div class="state-item">
        <div class="state-key">order_id</div>
        <div class="state-val null-val" id="s-order">null</div>
      </div>
      <div class="state-item">
        <div class="state-key">reason</div>
        <div class="state-val null-val" id="s-reason">null</div>
      </div>
      <div class="state-item">
        <div class="state-key">awaiting_confirmation</div>
        <div class="state-val null-val" id="s-confirm">false</div>
      </div>
      <div class="state-item">
        <div class="state-key">last_action</div>
        <div class="state-val null-val" id="s-action">—</div>
      </div>
      <div class="state-item">
        <div class="state-key">guardrail_triggered</div>
        <div class="state-val null-val" id="s-guard">false</div>
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="big-mono">Send a message to begin</div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="user-input" rows="1" placeholder="Type a message or order ID..."></textarea>
      </div>
      <button class="clear-btn" onclick="clearChat()">Clear</button>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
  const API_BASE = '';

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const emptyState  = document.getElementById('empty-state');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const userSelect  = document.getElementById('user-select');

  // ── Health check ──
  async function checkHealth() {
    try {
      const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) setStatus(true);
      else setStatus(false);
    } catch {
      setStatus(false);
    }
  }

  function setStatus(online) {
    statusDot.className  = 'status-dot' + (online ? ' online' : '');
    statusText.textContent = online ? 'online' : 'offline';
  }

  checkHealth();
  setInterval(checkHealth, 15000);

  // ── Auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Send ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    const userId = userSelect.value;
    emptyState.style.display = 'none';

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typing = appendTyping();

    try {
      const res = await fetch(`${API_BASE}/agent/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, message: text })
      });

      const data = await res.json();
      typing.remove();

      const intent = data.intent || null;
      const guardrail = data.guardrail_triggered || false;
      const actionResult = data.action_result || null;

      // Determine badge type
      let badgeClass = '';
      if (guardrail) badgeClass = 'guardrail';
      else if (actionResult === 'pending_confirmation') badgeClass = 'pending';
      else if (data.success) badgeClass = 'success';

      appendMessage('agent', data.response, intent, badgeClass);
      updateState(data);

    } catch (err) {
      typing.remove();
      appendMessage('error', '⚠ Could not reach the agent. Is the server running?');
    }

    sendBtn.disabled = false;
    scrollToBottom();
  }

  function quickSend(text) {
    inputEl.value = text;
    sendMessage();
  }

  // ── Append message ──
  function appendMessage(role, text, intent, badgeClass) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = role === 'user'
      ? `${userSelect.value} · ${timestamp()}`
      : `agent · ${timestamp()}`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    wrap.appendChild(meta);
    wrap.appendChild(bubble);

    if (intent && role === 'agent') {
      const badge = document.createElement('div');
      badge.className = `intent-badge ${badgeClass}`;
      badge.textContent = intent;
      wrap.appendChild(badge);
    }

    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg agent';

    const typing = document.createElement('div');
    typing.className = 'typing visible';
    typing.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(typing);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  // ── State panel ──
  function updateState(data) {
    const after = data.state_after || {};

    setStateVal('s-intent',  after.pending_intent,           !after.pending_intent);
    setStateVal('s-order',   after.order_id,                 !after.order_id);
    setStateVal('s-reason',  after.reason,                   !after.reason);
    setStateVal('s-confirm', after.awaiting_confirmation,    !after.awaiting_confirmation, 'bool');
    setStateVal('s-action',  data.action_result || '—',      !data.action_result);
    setStateVal('s-guard',   data.guardrail_triggered || false, true, 'bool');
  }

  function setStateVal(id, val, isNull, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = val === null || val === undefined ? 'null' : String(val);
    el.className = 'state-val';
    if (isNull) el.classList.add('null-val');
    if (type === 'bool' && val === true) el.classList.add('bool-true');
  }

  // ── Helpers ──
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function timestamp() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function clearChat() {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';

    // Reset state panel
    ['s-intent','s-order','s-reason'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = 'null';
      el.className = 'state-val null-val';
    });
    document.getElementById('s-confirm').textContent = 'false';
    document.getElementById('s-confirm').className = 'state-val null-val';
    document.getElementById('s-action').textContent = '—';
    document.getElementById('s-action').className = 'state-val null-val';
    document.getElementById('s-guard').textContent = 'false';
    document.getElementById('s-guard').className = 'state-val null-val';
  }

  // ── User switch resets state display ──
  userSelect.addEventListener('change', clearChat);
</script>
</body>
</html>
